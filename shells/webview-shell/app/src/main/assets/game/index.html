<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Bunnymark (WebView baseline)</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }
  </style>
</head>
<body>
  <!-- WebView baseline: native browser globals, no adapter. Pixi bundled in (no CDN).
       Migo loads the same game code from game.js (adapter prepended). -->
  <canvas id="GameCanvas"></canvas>
  <script src="game.bundle.js"></script>
</body>
</html>
