# Host CI for migo-bench. It validates everything that does NOT need the physical
# phone: the harness parses/compares correctly, the scripts are syntactically sound,
# and the WebView baseline shell still builds. Real-device capture (run.sh) cannot run
# on a hosted runner — it needs a connected device — so it stays a local/manual step.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: pip install pytest

      - name: Bash syntax check (all harness scripts)
        run: for f in scripts/*.sh; do echo "bash -n $f"; bash -n "$f"; done

      - name: Python compiles
        run: python -m py_compile scripts/*.py tests/*.py

      - name: Unit tests (parse + compare)
        run: python -m pytest tests/ -q

      - name: Showcase table renders (Migo vs WebView, fixture)
        run: python3 scripts/compare.py --results tests/fixtures/compare_results.csv --game bunnymark --vs-webview

      - name: Regression gate self-test (must FAIL on the regressed fixture)
        run: |
          if python3 scripts/compare.py \
               --results tests/fixtures/compare_regressed.csv \
               --baseline tests/fixtures/compare_baseline.csv \
               --game bunnymark; then
            echo "::error::regression gate did not fail on a regressed candidate"; exit 1
          fi
          echo "regression gate correctly returned non-zero"

  build-webview-shell:
    # The WebView baseline is half the comparison — keep it building. (AGP 8.1.2 -> JDK 17.)
    # migo-shell is not built here: it needs the resolved migo.aar, which is pinned at run
    # time (--migo-aar) and is not committed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Assemble webview-shell (debug)
        working-directory: shells/webview-shell
        run: ./gradlew --no-daemon :app:assembleDebug
